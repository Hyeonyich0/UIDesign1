<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CSS Still Life</title>
  <link rel="stylesheet" href="assets/css/codingfromlife.css">
</head>

<body>
  <div id="align">
    <div id="stage">

      <!-- background -->
      <div id="back-wall"></div>
      <div id="green-cloth"></div>
      <div id="yellow-table"></div>
      <div id="table-front"></div>
      <div id="floor"></div>

      <!-- table legs -->
      <div id="table-leg-left"></div>
      <div id="table-leg-right"></div>
      <div id="table-leg-side"></div>

      <!-- new objects -->
      <div id="triangle"></div>
      <div id="book"></div>

      <!-- bowl and fruits -->
      <div id="white-bowl"></div>
      <div id="orange"></div>
      <div id="lemon"></div>

      <!-- stems -->
      <div class="stem stem1"></div>
      <div class="stem stem2"></div>
      <div class="stem stem3"></div>
      <div class="stem stem4"></div>

      <!-- flowers -->
      <div class="flower flower1"></div>
      <div class="flower flower2"></div>
      <div class="flower flower3"></div>
      <div class="flower flower4"></div>

      <!-- vase -->
      <div id="vase"></div>
      <div id="vase-neck"></div>

    </div>
  </div>
</body>
</html>
