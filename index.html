<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CHO HYEONYI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f1ea;
      color: #111;
      font-family: Helvetica, Arial, sans-serif;
    }

    #grid {
      display: grid;
      grid-template-columns: 42vw 1fr;
      min-height: 100vh;
    }

    #left-column {
      padding: 36px;
      height: 100vh;
      overflow-y: scroll;
      border-right: 1.5px solid #111;
      background: #f4f1ea;
    }

    .scroll::-webkit-scrollbar {
      width: 8px;
    }

    .scroll::-webkit-scrollbar-thumb {
      background: #111;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: clamp(48px, 9vw, 120px);
      line-height: 0.85;
      letter-spacing: -0.08em;
      font-weight: 900;
      text-transform: uppercase;
    }

    .desc {
      margin: 0 0 40px 0;
      font-size: 22px;
      line-height: 1.2;
      font-style: italic;
      border-top: 1.5px solid #111;
      border-bottom: 1.5px solid #111;
      padding: 14px 0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      border-bottom: 1.5px solid #111;
      padding: 18px 0;
    }

    li::before {
      content: "→ ";
      font-weight: bold;
    }

    a {
      color: #111;
      text-decoration: none;
      border-bottom: 2px solid #111;
      transition: all 0.25s ease;
    }

    a:hover {
      background: #111;
      color: #f4f1ea;
      padding: 0 6px;
    }

    .ascii {
      margin-top: 80px;
      font-size: 24px;
      line-height: 1.15;
      text-align: left;
      font-family: "Courier New", monospace;
      border: 1.5px solid #111;
      padding: 24px;
      background: #fffdf6;
      transform: rotate(-1.5deg);
    }

    @media (max-width: 768px) {
      #grid {
        display: block;
      }

      #left-column {
        width: 100%;
        height: auto;
        border-right: none;
        padding: 24px;
      }

      h1 {
        font-size: 64px;
      }

      li {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div id="grid">
    <div id="left-column" class="scroll">  

      <h1>CHO HYEONYI</h1>  

      <p class="desc">
        Visual Design Major
      </p>

      <ul>
        <li>My favorite food is Shellfish dishes, Sashimi</li>
        
        <li>
          My favorite song is 
          <a href="https://youtu.be/4k_HiMxY_gg?si=b0G8AQNT9Xvd2Dv6" target="_blank">
            Hearts2Hearts - Apple Pie
          </a>
        </li>

        <li>
          My favorite website is 
          <a href="https://www.pinterest.com" target="_blank">
            Pinterest
          </a>
        </li>
      </ul>

      <pre class="ascii">
(\_/)
( •_•)   🍪   (⌐■_■)
 / >
      </pre>

    </div>
  </div>

</body>
</html>
